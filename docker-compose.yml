version: '3.8'

services:
  # Ollama LLM backend
  ollama:
    image: ollama/ollama:latest
    container_name: bwb_ai_ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11435:11434"  # Map 11434 in container to 11435 on host (11434 used by local Ollama)
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models
    networks:
      - bwb_ai_network
    healthcheck:
      test: ["CMD-SHELL", "pgrep ollama > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # bwb_ai WebSocket Server
  bwb_ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bwb_ai_ws
    environment:
      RUST_LOG: info
      OLLAMA_HOST: http://ollama:11434  # Internal container network (port 11434)
    ports:
      - "8080:8080"
    volumes:
      - bwb_ai_data:/home/ai/.bwb_ai
      - ./docs:/home/ai/docs:ro
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - bwb_ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "ws://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    command: ["--ws", "--ws-addr", "0.0.0.0:8080"]

# Named volumes
volumes:
  ollama_data:
    driver: local
  bwb_ai_data:
    driver: local

# Networks
networks:
  bwb_ai_network:
    driver: bridge
